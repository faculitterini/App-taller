{% extends "base.html" %}
{% block contenido %}

<h3 class="mb-3">
    {% if precio %}
        Editar precio
    {% else %}
        Nuevo precio
    {% endif %}
</h3>

<form method="POST">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Concepto *</label>
            <input type="text" name="concepto" class="form-control"
                   value="{{ precio[1] if precio else '' }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Categoría</label>
            <input type="text" name="categoria" class="form-control"
                   value="{{ precio[2] if precio else '' }}"
                   placeholder="Ej: Motor, Frenos, Service">
        </div>

        <div class="col-md-4">
            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-select">
                <option value="SERVICIO" {% if precio and precio[3] == 'SERVICIO' %}selected{% endif %}>Servicio</option>
                <option value="REPUESTO" {% if precio and precio[3] == 'REPUESTO' %}selected{% endif %}>Repuesto</option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Precio *</label>
            <input type="number" step="0.01" min="0" name="precio" class="form-control"
                   value="{{ precio[4] if precio else '' }}" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Estado</label>
            <select name="activo" class="form-select">
                <option value="1" {% if not precio or precio[6] == 1 %}selected{% endif %}>Activo</option>
                <option value="0" {% if precio and precio[6] == 0 %}selected{% endif %}>Inactivo</option>
            </select>
        </div>

        <div class="col-12">
            <label class="form-label">Notas</label>
            <textarea name="notas" class="form-control" rows="3">{{ precio[5] if precio else '' }}</textarea>
        </div>
    </div>

    <div class="mt-3">
        <button class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('lista_precios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

{% endblock %}
